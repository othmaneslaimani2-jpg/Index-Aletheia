<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>L'Index Aletheia</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link href="https://db.onlinewebfonts.com/c/58f5c5663b8959e970ab07a5cabdc4ca?family=Flecha+Test+M+Medium" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <div class="logo">
                <img src="img/logo.png" alt="L'Index Aletheia Logo" />
                <h1>L'Index Aletheia</h1>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="quote-card">
                <div class="quote-img-container">
                    <img 
                        src="img/qbg.jpeg" 
                        srcset="img/qbg.jpeg 1200w, img/qbg%202.jpeg 800w, img/qbg%203.jpeg 400w" 
                        sizes="(max-width: 800px) 100vw, 400px" 
                        class="quote-img" 
                        alt="Statue of a philosopher"
                    />
                </div>
                <div class="quote-content">
                    <blockquote id="quote-text">
                        “A man with outward courage dares to die: a man with inner courage dares to live.”
                    </blockquote>
                    <cite id="quote-author">Lao Tzu</cite>
                </div>
            </div>
            <button class="btn-new-quote" id="new-quote-btn">New Quote</button>
        </section>

        <section class="search-section">
            <form class="search-bar">
                <div class="search-input-wrapper">
                    <img src="img/search-icon.svg" class="search-icon" alt="Search icon" />
                    <input type="text" placeholder="Search..." aria-label="Search books" />
                    <button type="submit" class="btn-search">Search</button>
                </div>
            </form>
        </section>

        <section class="books-section">
            <div class="books-header">
                <h2>Books</h2>
                <a href="#" class="view-more">View More ...</a>
            </div>
            <div class="books-grid">
                <article class="book-card">
                    <div class="placeholder">180 &times; 276</div>
                </article>
                <article class="book-card">
                    <div class="placeholder">180 &times; 276</div>
                </article>
                <article class="book-card">
                    <div class="placeholder">180 &times; 276</div>
                </article>
                <article class="book-card">
                    <div class="placeholder">180 &times; 276</div>
                </article>
                <article class="book-card">
                    <div class="placeholder">180 &times; 276</div>
                </article>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="logo">
                <img src="img/logo.png" alt="L'Index Aletheia Logo" />
                <span>L'Index Aletheia</span>
            </div>
            <div class="copyright">
                &copy; All Right Reserved 2026
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
